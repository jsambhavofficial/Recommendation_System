<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hacher's Login Form</title>
  <style>
    :root {
      --border-color: #31302E;
      --shadow-color: #31302E;
      --main-bg-color: #000;
      --secondary-bg-color: #F8EEE2;
      --lamp-light-color: #E2D3C1;
      --lamp-dark-color: #E2D3C1;
      --rope-color: #EF4629;
      --icon-color: #31302E;
      --lamp-width: 140px;
      --lamp-height: 100px;
      --lamp-top-height: 20px;
    }

    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: var(--main-bg-color);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

  
    .slider-form {
      margin: 0 0 2em 0;
      width: 200px;
      padding: 1.5em 2.2em;
      border-radius: 4px;
      background: var(--secondary-bg-color);
      box-shadow: 0 5px 15px var(--shadow-color);
      z-index: 10;
    }

    .lamp-wrapper {
      position: relative;
      width: 100%;
      justify-content: center;
      display: flex;
      margin-bottom: 2em;
    }

    .lamp {
      height: var(--lamp-height);
      width: var(--lamp-width);
      position: relative;
      z-index: 2;
    }

    .lamp-part {
      background-color: var(--lamp-dark-color);
      transform: skewX(-5deg);
      height: var(--lamp-height);
      width: 60%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .lamp-part.-body.right {
      transform: skewX(5deg);
      left: auto;
      right: 0;
    }

    .lamp-part.-top {
      background: transparent;
      position: absolute;
      width: calc(var(--lamp-width) - 10px);
      height: var(--lamp-top-height);
      left: 6px;
      top: -17px;
    }

    .lamp-part.-top-part {
      width: 50%;
      height: var(--lamp-top-height);
      left: 0;
      top: 0;
      transform: skewX(-5deg);
      border-radius: 80% 0 0 0;
      border-top: 2px solid var(--border-color);
      border-bottom: none;
    }

    .lamp-part.-top-part.right {
      transform: skewX(5deg);
      left: auto;
      right: 1px;
      border-radius: 0 80% 0 0;
    }

    .lamp-part.-bottom {
      background: linear-gradient(#FFFFFA, #FDFFB2);
      height: calc(var(--lamp-top-height) + 10px);
      width: calc(var(--lamp-width) + 10px);
      position: absolute;
      top: auto;
      bottom: -18px;
      left: -5px;
      border-radius: 50%;
      border-top: 3px solid var(--border-color);
      border-bottom: 2px solid var(--border-color);
    }

    .lamp-part.-bottom:before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      background: linear-gradient(var(--border-color), var(--lamp-light-color));
      border-radius: 50%;
      width: 100%;
      height: 100%;
      opacity: 1;
    }

    .blub {
      position: absolute;
      width: calc(var(--lamp-width) - 20px);
      height: calc(var(--lamp-height) - 20px);
      top: calc(var(--lamp-top-height) - 10px);
      left: calc(var(--lamp-top-height) - 10px);
      border-radius: 5% 3% 38% 40%;
      background-color: #FFFFFA;
      -webkit-filter: blur(15px);
      filter: blur(15px);
      z-index: 2;
      opacity: 0;
      transition: all 300ms;
    }

    .lamp-rope {
      position: absolute;
      width: 8px;
      height: 200px;
      background: linear-gradient(var(--border-color) 9%, var(--rope-color));
      bottom: 100%;
      margin: auto;
    }

    .wall-light-shadow {
      background: linear-gradient(var(--lamp-light-color), var(--main-bg-color) 30%);
      width: 80%;
      height: 200vh;
      position: absolute;
      top: 150%;
      left: auto;
      border-radius: 50% 50% 0 0;
      -webkit-filter: blur(5px);
      filter: blur(5px);
      z-index: -1;
      opacity: 0;
      transition: all 300ms;
    }

    
    .login-form {
      margin-top: 50px;
      width: 250px;
      padding: 2em 2.2em;
      border-radius: 8px;
      background: #663300;
      box-shadow: 0 5px 15px var(--shadow-color);
      opacity: 0;
      transition: all 300ms ease;
      transform: translateY(20px);
    }

    .login-form h2 {
      text-align: center;
      color: #E2D3C1;
      margin-bottom: 1.5em;
      font-size: 1.5em;
    }

    .form-group {
      margin-bottom: 1.2em;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5em;
      color: #E2D3C1;
      font-weight: bold;
      font-size: 0.9em;
    }

    .form-group input {
      width: 100%;
      padding: 0.8em;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 1em;
      transition: border-color 300ms ease;
      box-sizing: border-box;
      background:#E2D3C1;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--rope-color);
    }

    .login-btn {
      width: 100%;
      padding: 0.8em;
      background: #E2D3C1;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 300ms ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .login-btn:hover {
      color:#E2D3C1;
      background: #be5f00;
      transform: translateY(-1px);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .icon {
      width: 8px;
      height: 8px;
      display: inline-block;
    }

    .sun {
      background: var(--icon-color);
      border-radius: 50%;
      position: relative;
      float: left;
      transform: scale(0.8);
    }

    .ray {
      background: var(--icon-color);
      width: 2px;
      height: 4px;
      position: absolute;
      left: 3px;
      bottom: 12px;
      transform-origin: 50% calc(100% + 8px);
      border-radius: 50%;
    }

    .ray:nth-child(1) { transform: rotate(45deg); }
    .ray:nth-child(2) { transform: rotate(90deg); }
    .ray:nth-child(3) { transform: rotate(135deg); }
    .ray:nth-child(4) { transform: rotate(180deg); }
    .ray:nth-child(5) { transform: rotate(225deg); }
    .ray:nth-child(6) { transform: rotate(270deg); }
    .ray:nth-child(7) { transform: rotate(315deg); }
    .ray:nth-child(8) { transform: rotate(360deg); }

    input[type=range] {
      -webkit-appearance: none;
      width: calc(100% - 30px);
      float: right;
    }

    input[type=range]:focus {
      outline: none;
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      cursor: pointer;
      background: var(--icon-color);
    }

    input[type=range]::-webkit-slider-thumb {
      height: 13px;
      width: 13px;
      border-radius: 50%;
      background: var(--icon-color);
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -6px;
    }

    input[type=range]:hover::-webkit-slider-thumb {
      box-shadow: 0 0 5px var(--icon-color);
    }

    input[type=range]::-moz-range-track {
      width: 100%;
      height: 2px;
      cursor: pointer;
      background: var(--icon-color);
    }

    input[type=range]::-moz-range-thumb {
      height: 13px;
      width: 13px;
      border-radius: 50%;
      background: var(--icon-color);
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -6px;
    }

    /* ── Auth tabs ── */
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5em;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #E2D3C1;
    }
    .auth-tab {
      flex: 1;
      padding: 0.6em;
      text-align: center;
      font-size: 0.85em;
      font-weight: bold;
      color: #E2D3C1;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: Arial, sans-serif;
    }
    .auth-tab.active {
      background: #E2D3C1;
      color: #663300;
    }
    .auth-tab:hover:not(.active) {
      background: rgba(226, 211, 193, 0.15);
    }

    .form-panel { display: block; }
    .form-panel.hidden { display: none; }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      color: #fff;
      z-index: 200;
      transform: translateX(120%);
      transition: transform 0.4s ease;
      max-width: 320px;
      font-family: Arial, sans-serif;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #27ae60; }
    .toast.error { background: #e74c3c; }

    /* Error input */
    .form-group input.input-error {
      border-color: #e74c3c;
    }

    body[data-light^="1"] .blub, body[data-light^="1"] .wall-light-shadow {
      opacity: 0.1;
    }
    body[data-light^="1"] .lamp-part.-bottom:before {
      opacity: 0.9;
    }
    body[data-light^="1"] .login-form {
      opacity: 0.1;
      transform: translateY(15px);
    }

    body[data-light^="2"] .blub, body[data-light^="2"] .wall-light-shadow {
      opacity: 0.2;
    }
    body[data-light^="2"] .lamp-part.-bottom:before {
      opacity: 0.8;
    }
    body[data-light^="2"] .login-form {
      opacity: 0.2;
      transform: translateY(10px);
    }

    body[data-light^="3"] .blub, body[data-light^="3"] .wall-light-shadow {
      opacity: 0.3;
    }
    body[data-light^="3"] .lamp-part.-bottom:before {
      opacity: 0.7;
    }
    body[data-light^="3"] .login-form {
      opacity: 0.3;
      transform: translateY(8px);
    }

    body[data-light^="4"] .blub, body[data-light^="4"] .wall-light-shadow {
      opacity: 0.4;
    }
    body[data-light^="4"] .lamp-part.-bottom:before {
      opacity: 0.6;
    }
    body[data-light^="4"] .login-form {
      opacity: 0.4;
      transform: translateY(6px);
    }

    body[data-light^="5"] .blub, body[data-light^="5"] .wall-light-shadow {
      opacity: 0.5;
    }
    body[data-light^="5"] .lamp-part.-bottom:before {
      opacity: 0.5;
    }
    body[data-light^="5"] .login-form {
      opacity: 0.5;
      transform: translateY(4px);
    }

    body[data-light^="6"] .blub, body[data-light^="6"] .wall-light-shadow {
      opacity: 0.6;
    }
    body[data-light^="6"] .lamp-part.-bottom:before {
      opacity: 0.4;
    }
    body[data-light^="6"] .login-form {
      opacity: 0.6;
      transform: translateY(3px);
    }

    body[data-light^="7"] .blub, body[data-light^="7"] .wall-light-shadow {
      opacity: 0.7;
    }
    body[data-light^="7"] .lamp-part.-bottom:before {
      opacity: 0.3;
    }
    body[data-light^="7"] .login-form {
      opacity: 0.7;
      transform: translateY(2px);
    }

    body[data-light^="8"] .blub, body[data-light^="8"] .wall-light-shadow {
      opacity: 0.8;
    }
    body[data-light^="8"] .lamp-part.-bottom:before {
      opacity: 0.2;
    }
    body[data-light^="8"] .login-form {
      opacity: 0.8;
      transform: translateY(1px);
    }

    body[data-light^="9"] .blub, body[data-light^="9"] .wall-light-shadow {
      opacity: 0.9;
    }
    body[data-light^="9"] .lamp-part.-bottom:before {
      opacity: 0.1;
    }
    body[data-light^="9"] .login-form {
      opacity: 0.9;
      transform: translateY(0);
    }

    body[data-light="10"] .blub, body[data-light="10"] .wall-light-shadow {
      opacity: 1;
    }
    body[data-light="10"] .lamp-part.-bottom:before {
      opacity: 0;
    }
    body[data-light="10"] .login-form {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <form class="slider-form" oninput="body.setAttribute('data-light', slider.value)">
    <div class="icon sun">
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
    </div>
    <input type="range" id="slider" value="0" min="0" max="10">
  </form>

  <div class="lamp-wrapper">
    <div class="lamp-rope"></div>
    <div class="lamp">
      <div class="lamp-part -top">
          <div class="lamp-part -top-part"></div>
          <div class="lamp-part -top-part right"></div>
      </div>
      <div class="lamp-part -body"></div>
      <div class="lamp-part -body right"></div>
      <div class="lamp-part -bottom"></div>
      <div class="blub"></div>
    </div>
    <div class="wall-light-shadow"></div>
  </div>

  <div class="login-form">
    <h2>Welcome</h2>

    <!-- Login / Sign Up Tabs -->
    <div class="auth-tabs">
      <button type="button" class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button type="button" class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="form-panel" id="loginPanel">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginUser">Username:</label>
          <input type="text" id="loginUser" name="username" required>
        </div>
        <div class="form-group">
          <label for="loginPass">Password:</label>
          <input type="password" id="loginPass" name="password" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Login</button>
      </form>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="form-panel hidden" id="signupPanel">
      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signupUser">Username:</label>
          <input type="text" id="signupUser" required minlength="3">
        </div>
        <div class="form-group">
          <label for="signupEmail">Email:</label>
          <input type="email" id="signupEmail" required>
        </div>
        <div class="form-group">
          <label for="signupPass">Password:</label>
          <input type="password" id="signupPass" required minlength="6">
        </div>
        <div class="form-group">
          <label for="signupConfirm">Confirm Password:</label>
          <input type="password" id="signupConfirm" required>
        </div>
        <button type="submit" class="login-btn" id="signupBtn">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    // ── Tab switching ──
    function switchTab(tab) {
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
      document.getElementById('loginPanel').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupPanel').classList.toggle('hidden', tab !== 'signup');
    }

    // ── Toast ──
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(function() { t.classList.remove('show'); }, 3500);
    }

    // ── Login ──
    async function handleLogin(event) {
      event.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUser').value,
            password: document.getElementById('loginPass').value
          })
        });
        const data = await res.json();

        if (data.success) {
          showToast('Login successful!', 'success');
          setTimeout(function() { window.location.href = '/chatbot'; }, 800);
        } else {
          showToast(data.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      } catch (err) {
        showToast('Connection error. Try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    // ── Signup ──
    async function handleSignup(event) {
      event.preventDefault();
      const pass = document.getElementById('signupPass').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (pass !== confirm) {
        showToast('Passwords do not match.', 'error');
        document.getElementById('signupConfirm').classList.add('input-error');
        return;
      }
      document.getElementById('signupConfirm').classList.remove('input-error');

      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'Creating...';

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('signupUser').value,
            email: document.getElementById('signupEmail').value,
            password: pass
          })
        });
        const data = await res.json();

        if (data.success) {
          showToast('Account created! Please login.', 'success');
          setTimeout(function() { switchTab('login'); }, 1000);
        } else {
          showToast(data.message, 'error');
        }
      } catch (err) {
        showToast('Connection error. Try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
